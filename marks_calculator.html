<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks calculator</title>
    <link rel="stylesheet" href="marks_calculator.css">
</head>
<body>
    <h1>Subjects Marks Calculator</h1>
    <div class="container">
        
        <div>
        <label for="math">Math:</label>
        <input type="number" id="math" placeholder="Enter marks for Math">
        </div>
        <div>
        <label for="science">Science:</label>
        <input type="number" id="science" placeholder="Enter marks for Science">
        </div>
        <div>
        <label for="punjabi">Punjabi:</label>
        <input type="number" id="punjabi" placeholder="Enter marks for Punjabi">
        </div>
        <div>
        <label for="hindi">Hindi:</label>
        <input type="number" id="hindi" placeholder="Enter marks for Hindi">
        </div>
        <div>
        <label for="social">Social:</label>
        <input type="number" id="social" placeholder="Enter marks for Social">
        </div>
        <div>
        <label for="computer">Computer:</label>
        <input type="number" id="computer" placeholder="Enter marks for Computer">
        </div>
        <button id="calculate" type="submit">Calculate</button>
        <h2>your total marks:</h2>
    </div>

    <script src="marks_calculator.js"></script>
</body>
</html>
